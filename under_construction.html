<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-0 min-h-screen flex items-center justify-center bg-gray-100 font-mono">

  <div class="text-center">
    <p class="mb-5 text-l text-gray-700">
      Website is under construction or maintenance
    </p>

    <button
      onclick="location.reload()"
      class="inline-flex items-center gap-2 rounded-lg bg-white px-4 py-2 text-black transition hover:white active:scale-95"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-4 w-4"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 4v5h.582M20 20v-5h-.581M5.63 19A9 9 0 1 0 6 5.3"
        />
      </svg>

      Refresh
    </button>
  </div>

</body>
</html>
